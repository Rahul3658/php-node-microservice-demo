version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demo
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"

  node-api:
    build: ./node-backend
    container_name: node-api
    ports:
      - "3059:3000"
    depends_on:
      - mysql

  php-web:
    build: ./php-frontend
    container_name: php-web
    ports:
      - "8085:80"
    depends_on:
      - node-api
